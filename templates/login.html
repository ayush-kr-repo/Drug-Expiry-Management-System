<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>DrugWatch — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:#010409;color:#e6edf3;font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .wrap{width:100%;max-width:380px;padding:20px;}
    .logo-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:40px;}
    .logo-icon{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,#ff6b6b,#ff3b3b);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;}
    .logo-name{font-size:22px;font-weight:700;}
    .logo-sub{font-size:11px;color:#8b949e;font-family:'DM Mono',monospace;letter-spacing:1.5px;margin-top:2px;}
    .card{background:#0d1117;border:1px solid #21262d;border-radius:12px;padding:32px;}
    .card h2{font-size:16px;font-weight:600;margin-bottom:24px;color:#8b949e;font-family:'DM Mono',monospace;letter-spacing:1px;}
    label{display:block;font-size:11px;color:#8b949e;font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:6px;}
    input{width:100%;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:11px 14px;color:#e6edf3;font-size:14px;font-family:'DM Mono',monospace;outline:none;margin-bottom:16px;}
    input:focus{border-color:#58a6ff;}
    button{width:100%;background:#ff3b3b;color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;margin-top:6px;}
    button:hover{background:#e03030;}
    .error{background:#ff3b3b11;border:1px solid #ff3b3b;color:#ff6b6b;padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:13px;}
    .hint{margin-top:20px;text-align:center;font-size:12px;color:#484f58;font-family:'DM Mono',monospace;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <div class="logo-icon">Rx</div>
    <div><div class="logo-name">DrugWatch</div><div class="logo-sub">EXPIRY MANAGEMENT SYSTEM</div></div>
  </div>
  <div class="card">
    <h2>SIGN IN</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <label>USERNAME</label>
      <input name="username" type="text" placeholder="admin" autocomplete="off" required/>
      <label>PASSWORD</label>
      <input name="password" type="password" placeholder="••••••••" required/>
      <button type="submit">Enter System →</button>
    </form>
    <div class="hint">admin / admin123 &nbsp;·&nbsp; pharma1 / pharma123</div>
  </div>
</div>
</body>
</html>
